<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskAvatar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="overlay" id="drag-region">
      <div class="avatar" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe0c2" />
              <stop offset="100%" stop-color="#f5b889" />
            </linearGradient>
          </defs>
          <circle cx="60" cy="60" r="56" fill="url(#face)" />
          <circle cx="42" cy="52" r="6" fill="#2b2118" />
          <circle cx="78" cy="52" r="6" fill="#2b2118" />
          <path
            d="M40 76 C50 88, 70 88, 80 76"
            fill="none"
            stroke="#2b2118"
            stroke-width="5"
            stroke-linecap="round"
          />
          <circle cx="34" cy="66" r="7" fill="#f08a6b" opacity="0.45" />
          <circle cx="86" cy="66" r="7" fill="#f08a6b" opacity="0.45" />
        </svg>
      </div>
      <p class="status" id="status-text">Loading…</p>
    </div>
    <script src="status-view.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
