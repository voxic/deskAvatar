<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskAvatar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="overlay" id="drag-region">
      <div class="avatar" data-animation="idle" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1d1b15" />
              <stop offset="100%" stop-color="#14120b" />
            </linearGradient>
            <filter id="led-glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <g class="avatar-face">
            <rect
              x="8"
              y="8"
              width="104"
              height="104"
              rx="22"
              ry="22"
              fill="url(#panel)"
              stroke="#2b2923"
              stroke-width="2"
            />
            <g class="avatar-eyes" filter="url(#led-glow)">
              <rect
                x="28"
                y="42"
                width="22"
                height="8"
                rx="4"
                ry="4"
                fill="#5eead4"
              />
              <rect
                x="70"
                y="42"
                width="22"
                height="8"
                rx="4"
                ry="4"
                fill="#5eead4"
              />
            </g>
            <g class="avatar-mouth" filter="url(#led-glow)">
              <rect
                x="44"
                y="74"
                width="32"
                height="6"
                rx="3"
                ry="3"
                fill="#5eead4"
              />
            </g>
          </g>
        </svg>
      </div>
      <p class="status" id="status-text">Loading…</p>
    </div>
    <script src="status-view.js"></script>
    <script src="avatar-animation.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
